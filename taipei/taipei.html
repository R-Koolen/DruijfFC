<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schatzoeker — Taipei</title>
  <link rel="stylesheet" href="../main.css" />
  <link rel="stylesheet" href="taipei.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<div class="hunt-page page-enter">

  <header class="hunt-header">
    <button class="btn-back" onclick="window.location.href='../index.html'" aria-label="Terug">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9L11 14" stroke="#15171F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="hunt-header-title">Schatzoeker</div>
    <div class="hunt-header-right">
      <span class="progress-pill" id="progressPill">Stop 1 van 7</span>
      <button class="btn-reset-progress" id="btnResetProgress" aria-label="Voortgang wissen">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M6 4V2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V4M5 4l.5 9M11 4l-.5 9M8 4v9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="hunt-stage" id="huntStage"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="taipei.js"></script>
</body>
</html>
