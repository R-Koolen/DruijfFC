<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Questions</title>
  <link rel="stylesheet" href="../main.css" />
  <link rel="stylesheet" href="questions.css" />
</head>
<body>

<div class="blob-tl"></div>
<div class="blob-br"></div>

<div class="q-page">

  <!-- Header -->
  <header class="q-header">
    <button class="btn-back" onclick="window.location.href='../index.html'">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9L11 14" stroke="#2C2A26" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="q-header-center">
      <div class="q-header-title">Get to Know Each Other</div>
    </div>
    <div class="q-header-spacer"></div>
  </header>

  <!-- Stage -->
  <div class="q-stage">

    <!-- Category badge -->
    <div class="category-badge" id="catBadge"></div>

    <!-- Question card -->
    <div class="q-card-wrap">
      <div class="q-card" id="qCard">
        <div class="q-card-blob" id="qCardBlob"></div>
        <div class="q-emoji" id="qEmoji"></div>
        <div class="q-text"  id="qText"></div>
      </div>
    </div>

  </div>

  <!-- Action buttons -->
  <div class="q-actions">
    <div class="q-action-labels">
      <span class="q-action-label">Ander onderwerp</span>
      <span class="q-action-label">Zelfde sfeer</span>
    </div>

    <div class="q-buttons">
      <button class="btn-action btn-skip" id="btnSkip" title="Different topic">
        ✕
      </button>
      <button class="btn-action btn-next" id="btnNext" title="Similar question">
        ✓
      </button>
    </div>
  </div>

</div>

<script src="questions.js"></script>
</body>
</html>
