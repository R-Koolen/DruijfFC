<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Druijf FC</title>
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

<main class="home page-enter">

  <header class="home-hero">
    <div class="home-greeting">Hé daar <span class="wave">👋</span></div>
    <h1 class="home-title">Welk spel doen we vanavond?</h1>
  </header>

  <div class="home-cards">

    <!-- Schatzoeker -->
    <a href="taipei/taipei.html" class="game-card game-card--treasure">
      <div class="game-card-mascot">🗺️</div>
      <div class="game-card-body">
        <div class="game-card-eyebrow">Speurtocht</div>
        <div class="game-card-title">Schatzoeker</div>
        <div class="game-card-desc">7 stops door Taipei in één dag</div>
      </div>
      <div class="game-card-chevron" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M8 5l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <!-- Druijfhartig (Questions) -->
    <a href="questions/questions.html" class="game-card game-card--questions">
      <div class="game-card-mascot">💬</div>
      <div class="game-card-body">
        <div class="game-card-eyebrow">Druijfhartig</div>
        <div class="game-card-title">Vragen</div>
        <div class="game-card-desc">Leer elkaar beter kennen</div>
      </div>
      <div class="game-card-chevron" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M8 5l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <!-- Would You Rather (coming soon) -->
    <div class="game-card game-card--wyr is-disabled" aria-disabled="true">
      <div class="game-card-mascot">⚖️</div>
      <div class="game-card-body">
        <div class="game-card-eyebrow">Keuzespel</div>
        <div class="game-card-title">Would You Rather</div>
        <div class="game-card-desc">Onmogelijke keuzes maken</div>
      </div>
      <div class="game-card-soon">Binnenkort</div>
    </div>

  </div>

  <footer class="home-foot">
    <span>een echt kameradenmove — Druijf FC</span>
  </footer>

</main>

<script src="index.js"></script>
</body>
</html>
